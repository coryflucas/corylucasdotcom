name: PR build

on:
  pull_request:
    paths:
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: web

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1.249.0 
      with:
        ruby-version: '3.1'
        bundler-cache: true
        cache-version: 0
    - name: Build with Jekyll
      run: bundle exec jekyll build --baseurl "https://www.corylucas.com"
