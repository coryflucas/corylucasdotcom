name: PR build

on:
  pull_request:
    paths:
      - 'web/**'
      - 'Gemfile'
      - 'Gemfile.lock'

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1.295.0
      with:
        ruby-version: '3.4'
        bundler-cache: true
        cache-version: 0
    - name: Build with Jekyll
      run: bundle exec jekyll build --baseurl "https://www.corylucas.com"
